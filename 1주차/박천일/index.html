<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발자 프로필 명함</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="description" content="프론트엔드 개발자의 자기소개 카드 페이지입니다.">
</head>

<body>
    <main class="page-wrapper">
        <section class="profile-card">
            <figure class="profile-image-wrapper">
                <img src="./cheonil_img.png" alt="개발자 프로필 사진" class="profile-image" id="profile-img">
            </figure>
            <article class="profile-content">
                <header class="profile-header">
                    <h1 class="profile-name">박천일</h1>
                    <p class="profile-title">Frontend Developer</p>
                </header>
                <div class="profile-body">
                    <p class="profile-description">
                        컴퓨터 소프트웨어학과 22학번 박천일입니다.
                    </p>
                </div>
                <footer class="profile-footer">
                    <span class="skill-tag" id="tag-html">HTML5</span>
                    <span class="skill-tag" id="tag-css">CSS3</span>
                    <span class="skill-tag" id="tag-design">Web Design</span>
                </footer>
            </article>
        </section>

        <!-- 아래쪽: 상세 자기소개 정보 영역 -->
        <section class="detail-info">
            <h2 class="detail-title">상세 자기소개</h2>
            <div class="detail-body">
                <article class="info-section">
                    <h3 class="info-subtitle">학과 및 이름</h3>
                    <p class="info-text">
                        컴퓨터 소프트웨어학과 22학번으로 재학중인 박천일입니다.<br>

                    </p>
                </article>
                <article class="info-section">
                    <h3 class="info-subtitle">나이</h3>
                    <p class="info-text">
                        24<br>
                    </p>
                </article>
                <article class="info-section">
                    <h3 class="info-subtitle">학번 </h3>
                    <p class="info-text">
                        2226095<br>
                    </p>SSs
                </article>
            </div>
        </section>
    </main>
</body>

</html>
