<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="input_form_toggle_btn">
        <button id="show_input_form_btn">아기 사자 추가</button>
        <button id="last_lion_delete_btn">마지막 아기 사자 삭제</button>
        <p id="lion_count">현재 아기 사자 수: </p>
    </div>

    <div class="input_form_container">
        <form action="">
            <div class="name_part_row">
                <div class="input_group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="input_group">
                    <label for="part_selector">파트</label>
                    <select name="part_selector" id="part_selector" required>
                        <option value="">본인의 파트 선택</option>
                        <option value="Front">프론트엔드</option>
                        <option value="Back">백엔드</option>
                        <option value="Disign">디자인</option>
                    </select>
                </div>
            </div>
            
            <div class="input_group">
                <label for="tech">관심 기술</label>
                <input type="text" id="tech" name="tech" placeholder="쉼표로 구분하여 입력 (예: React, Next.js)" required>
            </div>
            
            <div class="input_group">
                <label for="short_intro">한 줄 소개</label>
                <input type="text" id="short_intro" name="short_intro" required>
            </div>
            
            <div class="input_group">
                <label for="intro">자기소개</label>
                <textarea id="intro" name="intro" rows="4" required></textarea>
            </div>

            <div class="input_group">
                <label for="comment">짧은 한마디</label>
                <input type="text" id="comment" name="comment" required>
            </div>
            
            <div class="contact_info">
                <h3>연락처</h3>
                <div class="input_group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="">
                </div>
                <div class="input_group">
                    <label for="website">웹사이트</label>
                    <input type="url" id="website" name="website" placeholder="https://example.com" required>
                </div>
                <div class="input_group">
                    <label for="phone">전화번호</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
            </div>
            
            <div class="submit_btn_wrapper">
                <button type="submit" id="add_btn">추가</button>
                <button type="button" id="cancel_btn">취소</button>
            </div>
        </form>
    </div>

    <div class="grid_container">
    </div>
    <div class="babylion_info_container">
    </div>

    <script src="script.js"></script>
</body>

</html>
