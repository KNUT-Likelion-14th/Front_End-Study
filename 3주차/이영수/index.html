<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3주차 · 동적 프로필 카드</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="page-shell">
        <header class="top-header">
            <h1 class="top-header__title">멋쟁이사자처럼 프로필 보드</h1>
            <div class="header-actions">
                <button type="button" class="add-button" id="openModalButton">+ 새 아기사자 추가</button>
                <button type="button" class="delete-button" id="deleteLastButton">마지막 아기사자 삭제</button>
            </div>
        </header>

        <section class="empty-state" id="emptyState" hidden>
            <div class="empty-state__card">
                <p class="empty-state__emoji" aria-hidden="true">🦁</p>
                <h2 class="empty-state__title">아직 등록된 아기사자가 없어요</h2>
                <p class="empty-state__desc">새 아기사자를 추가해서 프로필 보드를 채워보세요.</p>
                <button type="button" class="add-button" id="emptyAddButton">첫 아기사자 추가하기</button>
            </div>
        </section>

        <section class="card_list_container" aria-label="요약 프로필 카드 목록" id="summaryCards"></section>

        <section class="info_list_container" aria-label="상세 프로필 카드 목록" id="detailCards"></section>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal__header">
                <h2 id="modalTitle" class="modal__title">새 아기사자 추가</h2>
                <button type="button" class="close-button" id="closeModalButton" aria-label="닫기">&times;</button>
            </div>
            <form id="addLionForm" novalidate>
                <div class="form-grid">
                    <label class="form-field">
                        <span>이름</span>
                        <input name="name" type="text" placeholder="예: 이영수" required>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field">
                        <span>파트</span>
                        <select name="part" required>
                            <option value="">선택하세요</option>
                            <option value="Frontend">Frontend</option>
                            <option value="Backend">Backend</option>
                            <option value="Design">Design</option>
                        </select>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field form-field--full">
                        <span>사진 (assets용, 이미지 파일)</span>
                        <input name="photo" type="file" accept="image/*">
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field form-field--full">
                        <span>관심 기술 (쉼표로 구분)</span>
                        <input name="skills" type="text" placeholder="예: React, TypeScript, UI/UX" required>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field form-field--full">
                        <span>한 줄 소개 (요약 카드)</span>
                        <input name="tagline" type="text" placeholder="예: 사용자 경험을 고민하는 프론트엔드 개발자입니다." required>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field form-field--full">
                        <span>자기 소개 (상세 카드)</span>
                        <textarea name="intro" rows="3" placeholder="예: 안녕하세요! 실무에 강한 웹 개발자가 되기 위해 매일 학습하고 있습니다." required></textarea>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field">
                        <span>이메일</span>
                        <input name="email" type="email" placeholder="예: lion@example.com" required>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field">
                        <span>GitHub</span>
                        <input name="github" type="url" placeholder="예: https://github.com/your-id" required>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field form-field--full">
                        <span>웹사이트</span>
                        <input name="website" type="url" placeholder="예: https://your-portfolio.vercel.app" required>
                        <small class="error-message"></small>
                    </label>

                    <label class="form-field form-field--full">
                        <span>한 마디</span>
                        <input name="quote" type="text" placeholder="예: 작게라도 매일 성장하겠습니다!" required>
                        <small class="error-message"></small>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="button" class="secondary-button" id="cancelButton">취소</button>
                    <button type="submit" class="primary-button">완료</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
